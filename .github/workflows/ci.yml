name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run --group dev pybabel compile --directory resistance/locales --domain messages
      - run: git diff --exit-code -- resistance/locales
      - run: uv run --group dev pytest -q
      - run: uv run --group dev ruff check .
      - run: uv run --group dev mypy resistance
